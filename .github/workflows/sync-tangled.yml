name: Sync to Tangled

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.TANGLED_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan tangled.org >> ~/.ssh/known_hosts

      - name: Push to Tangled
        run: |
          git remote add tangled ssh://git@tangled.org/did:plc:lkxn6cxra5nsivs44z7la6om/keytrace.dev
          git push tangled main --force --tags
